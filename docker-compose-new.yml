# MeraDhan stack — Backend, CRM, Client (no Worker). Aligned with ecosystem.config.js.
# Usage: docker compose up -d
# Requires .env at repo root (see backend/.env.example).
# Database: use external Postgres — set DATABASE_URL and DIRECT_URL in .env (no postgres service here).

services:
  # ---------------------------------------------------------------------------
  # Cache (backend dependency; DB is external via .env)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: meradhan-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-enter-your-password}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Application (ecosystem.config.js: MeraDhan-Backend, MeraDhan-CRM, MeraDhan-Client)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backenddocker
    container_name: meradhan-backend
    env_file: .env
    environment:
      NODE_ENV: development
      # DB from .env (external Postgres); Redis from compose
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-enter-your-password}
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      # Mount source so changes on host reflect immediately; bun --watch restarts on file change
      - ./backend/src:/app/backend/src
    command: ["bun", "run", "dev"]
    depends_on:
      redis: { condition: service_started }
    restart: unless-stopped

  crm:
    build:
      context: .
      dockerfile: crmdockerfile
    container_name: meradhan-crm
    env_file: .env
    environment:
      NODE_ENV: production
      # Rewrite /api/server/* is done by CRM container → must reach backend by hostname
      NEXT_PUBLIC_BACKEND_HOST_URL: http://backend:4000
      # Browser must call same origin so Next.js can proxy /api/server → backend (avoids CORS)
      NEXT_PUBLIC_CRM_HOST_URL: http://localhost:4001
    ports:
      - "4001:4001"
    depends_on:
      - backend
    restart: unless-stopped

  meradhan:
    build:
      context: .
      dockerfile: frontendDockerfile
    container_name: meradhan-client
    env_file: .env
    environment:
      # Use development to see real errors (not "Site is Under Maintenance"); switch to production when fixed
      NODE_ENV: development
      # Browser (client) must use host URL; server-side in container uses backend hostname
      NEXT_PUBLIC_BACKEND_HOST_URL: ${NEXT_PUBLIC_BACKEND_HOST_URL:-http://localhost:4000}
      NEXT_PUBLIC_BACKEND_IP_URL: http://backend:4000
    ports:
      - "4002:4002"
    depends_on:
      - backend
    restart: unless-stopped

# Observability (Prometheus, Loki, Grafana) removed — not required for app to run.
# Backend exposes Prometheus metrics and sends logs to LOKI_URL (default external).
# See docker-compose_old.yml to run Prometheus/Loki/Grafana if needed.

volumes:
  redis_data:
