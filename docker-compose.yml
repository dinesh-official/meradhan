version: "3.8"

services:
  # Performance Tracking - Prometheus
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  # Log Tracking - Loki
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  # Visualization
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3300:3000" # Grafana UI
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--requirepass", "enter-your-password"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
