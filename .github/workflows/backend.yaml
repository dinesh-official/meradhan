name: backend deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env from GitHub Secrets
        shell: bash
        run: |
          cat > .env << 'EOF'
          # Static Public values
          NEXT_PUBLIC_HOST_URL=https://www.meradhan.co
          NEXT_PUBLIC_CRM_HOST_URL=https://crm.meradhan.co
          NEXT_PUBLIC_BACKEND_HOST_URL=https://api.meradhan.co
          NEXT_PUBLIC_BACKEND_IP_URL=http://prod-meradhan-be.prod-namespace:4000
          NEXT_PUBLIC_STRAPI_HOST_URL=https://spyder.meradhan.co
          NEXT_PUBLIC_DIGIO=production
          STRAPI_API_URL=https://spyder.meradhan.co/api
          PORT=4000
          RFQ_CBRICS_ENV=PROD
          CBRICS_ENV=PROD
          EOF

          # Append secrets safely using printf
          printf "GRAPHQL_KEY=%q\n" "${{ secrets.NEXT_PUBLIC_GRAPHQL_KEY }}" >> .env
          printf "STRAPI_API_TOKEN=%q\n" "${{ secrets.STRAPI_API_TOKEN }}" >> .env
          printf "JWT_SECRET=%q\n" "${{ secrets.JWT_SECRET }}" >> .env
          printf "DATABASE_URL=%q\n" "${{ secrets.DATABASE_URL }}" >> .env
          printf "DIRECT_URL=%q\n" "${{ secrets.DIRECT_URL }}" >> .env
          printf "REDIS_HOST=%q\n" "${{ secrets.REDIS_HOST }}" >> .env
          printf "REDIS_PORT=%q\n" "${{ secrets.REDIS_PORT }}" >> .env
          printf "KRA_USERNAME=%q\n" "${{ secrets.KRA_USERNAME }}" >> .env
          printf "KRA_PASSWORD=%q\n" "${{ secrets.KRA_PASSWORD }}" >> .env
          printf "KRA_PASS_KEY=%q\n" "${{ secrets.KRA_PASS_KEY }}" >> .env
          printf "KRA_MOB_NO=%q\n" "${{ secrets.KRA_MOB_NO }}" >> .env
          printf "KRA_OKRA_CD_MI_ID=%q\n" "${{ secrets.KRA_OKRA_CD_MI_ID }}" >> .env
          printf "KRA_ENV=%q\n" "${{ secrets.KRA_ENV }}" >> .env
          printf "MSG91_AUTH_KEY=%q\n" "${{ secrets.MSG91_AUTH_KEY }}" >> .env
          printf "MSG91_SIGNUP_TEMPLATE=%q\n" "${{ secrets.MSG91_SIGNUP_TEMPLATE }}" >> .env
          printf "MSG91_LOGIN_TEMPLATE=%q\n" "${{ secrets.MSG91_LOGIN_TEMPLATE }}" >> .env
          printf "MSG91_VERIFY_TEMPLATE=%q\n" "${{ secrets.MSG91_VERIFY_TEMPLATE }}" >> .env
          printf "SMTP_SENDER=%q\n" "${{ secrets.SMTP_SENDER }}" >> .env
          printf "SMTP_HOST=%q\n" "${{ secrets.SMTP_HOST }}" >> .env
          printf "SMTP_PORT=%q\n" "${{ secrets.SMTP_PORT }}" >> .env
          printf "SMTP_USER=%q\n" "${{ secrets.SMTP_USER }}" >> .env
          printf "SMTP_PASS=%q\n" "${{ secrets.SMTP_PASS }}" >> .env
          printf "CBRICS_DOMAIN=%q\n" "${{ secrets.CBRICS_DOMAIN }}" >> .env
          printf "CBRICS_LOGIN=%q\n" "${{ secrets.CBRICS_LOGIN }}" >> .env
          printf "CBRICS_PASSWORD=%q\n" "${{ secrets.CBRICS_PASSWORD }}" >> .env
          printf "RFQ_CBRICS_DOMAIN=%q\n" "${{ secrets.RFQ_CBRICS_DOMAIN }}" >> .env
          printf "RFQ_CBRICS_LOGIN=%q\n" "${{ secrets.RFQ_CBRICS_LOGIN }}" >> .env
          printf "RFQ_CBRICS_PASSWORD=%q\n" "${{ secrets.RFQ_CBRICS_PASSWORD }}" >> .env
          printf "DIGIO_USERNAME_PASS=%q\n" "${{ secrets.DIGIO_USERNAME_PASS }}" >> .env
          printf "NDSL_REQUESTOR_ID=%q\n" "${{ secrets.NDSL_REQUESTOR_ID }}" >> .env
          printf "NSDL_SECRET_KEY=%q\n" "${{ secrets.NSDL_SECRET_KEY }}" >> .env
          printf "CDSL_AES_KEY=%q\n" "${{ secrets.CDSL_AES_KEY }}" >> .env
          printf "ENTITY_ID=%q\n" "${{ secrets.ENTITY_ID }}" >> .env
          printf "AUTH_SECRET=%q\n" "${{ secrets.AUTH_SECRET }}" >> .env
          printf "AUTH_GOOGLE_ID=%q\n" "${{ secrets.AUTH_GOOGLE_ID }}" >> .env
          printf "AUTH_GOOGLE_SECRET=%q\n" "${{ secrets.AUTH_GOOGLE_SECRET }}" >> .env
          printf "AUTH_FACEBOOK_ID=%q\n" "${{ secrets.AUTH_FACEBOOK_ID }}" >> .env
          printf "AUTH_FACEBOOK_SECRET=%q\n" "${{ secrets.AUTH_FACEBOOK_SECRET }}" >> .env
          printf "AUTH_MICROSOFT_ENTRA_ID_ID=%q\n" "${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}" >> .env
          printf "AUTH_MICROSOFT_ENTRA_ID_SECRET=%q\n" "${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}" >> .env
          printf "AUTH_MICROSOFT_ENTRA_ID_ISSUER=%q\n" "${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ISSUER }}" >> .env
          printf "RAZORPAY_KEY_ID=%q\n" "${{ secrets.RAZORPAY_KEY_ID }}" >> .env
          printf "RAZORPAY_KEY_SECRET=%q\n" "${{ secrets.RAZORPAY_KEY_SECRET }}" >> .env
          printf "RAZORPAY_WEBHOOK_SECRET=%q\n" "${{ secrets.RAZORPAY_WEBHOOK_SECRET }}" >> .env
          printf "CDSL_MODE=%q\n" "${{ secrets.CDSL_MODE }}" >> .env
          printf "NSDL_MODE=%q\n" "${{ secrets.NSDL_MODE }}" >> .env
          printf "S3_ACCESS_KEY_ID=%q\n" "${{ secrets.S3_ACCESS_KEY_ID }}" >> .env
          printf "S3_SECRET_ACCESS_KEY=%q\n" "${{ secrets.S3_SECRET_ACCESS_KEY }}" >> .env
          printf "S3_REGION=%q\n" "${{ secrets.S3_REGION }}" >> .env
          printf "S3_ENDPOINT=%q\n" "${{ secrets.S3_ENDPOINT }}" >> .env
          printf "S3_BUCKET_NAME=%q\n" "${{ secrets.S3_BUCKET_NAME }}" >> .env

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Show .env
        run: cat .env

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag & Push Docker Image
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          REPOSITORY: prod-be
          IMAGE_TAG: latest
        run: |
          docker build -f backenddocker -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: meradhan-be-task.json
          cluster: prod-cluster
          service: prod-meredha-be
          force-new-deployment: true
