name: backend deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Create .env from secrets (single clean step)
      - name: Create .env file
        run: |
          echo "NEXT_PUBLIC_HOST_URL=https://www.meradhan.co" > .env
          echo "NEXT_PUBLIC_CRM_HOST_URL=https://crm.meradhan.co" >> .env
          echo "NEXT_PUBLIC_BACKEND_HOST_URL=https://api.meradhan.co" >> .env
          echo "NEXT_PUBLIC_BACKEND_IP_URL=http://prod-meradhan-be.prod-namespace:4000" >> .env
          echo "NEXT_PUBLIC_STRAPI_HOST_URL=https://spyder.meradhan.co" >> .env
          echo "NEXT_PUBLIC_DIGIO=production" >> .env
          echo "STRAPI_API_URL=https://spyder.meradhan.co/api" >> .env
          echo "PORT=4000" >> .env

          # Append secret ENV values if needed
          echo "${{ secrets.ENV_FILE }}" >> .env

      - name: Show .env
        run: cat .env

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag & Push Docker Image
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          REPOSITORY: prod-be
          IMAGE_TAG: latest
        run: |
          docker build -f backenddocker -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: prod_tsk_be.json
          cluster: prod_cluster
          service: prod-tsk-be-svc
          force-new-deployment: true
