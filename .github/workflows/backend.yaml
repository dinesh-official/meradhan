name: backend deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          # Static Public values
          echo "NEXT_PUBLIC_HOST_URL=https://www.meradhan.co" > .env
          echo "NEXT_PUBLIC_CRM_HOST_URL=https://crm.meradhan.co" >> .env
          echo "NEXT_PUBLIC_BACKEND_HOST_URL=https://api.meradhan.co" >> .env
          echo "NEXT_PUBLIC_BACKEND_IP_URL=http://prod-meradhan-be.prod-namespace:4000" >> .env
          echo "NEXT_PUBLIC_STRAPI_HOST_URL=https://spyder.meradhan.co" >> .env
          echo "NEXT_PUBLIC_DIGIO=production" >> .env
          echo "STRAPI_API_URL=https://spyder.meradhan.co/api" >> .env
          echo "PORT=4000" >> .env

          # Prefer secrets over hardcoded
          echo "RFQ_CBRICS_ENV=${{ secrets.RFQ_CBRICS_ENV }}" >> .env
          echo "CBRICS_ENV=${{ secrets.CBRICS_ENV }}" >> .env

          # Secrets
          echo "GRAPHQL_KEY=${{ secrets.GRAPHQL_KEY }}" >> .env
          echo "STRAPI_API_TOKEN=${{ secrets.STRAPI_API_TOKEN }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
          echo "DIRECT_URL=${{ secrets.DIRECT_URL }}" >> .env

          echo "REDIS_HOST=${{ secrets.REDIS_HOST }}" >> .env
          echo "REDIS_PORT=${{ secrets.REDIS_PORT }}" >> .env
          echo "REDIS_USERNAME=${{ secrets.REDIS_USERNAME }}" >> .env
          echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> .env

          echo "PASSWORD_PEPPER=${{ secrets.PASSWORD_PEPPER }}" >> .env

          echo "KRA_USERNAME=${{ secrets.KRA_USERNAME }}" >> .env
          echo "KRA_PASSWORD=${{ secrets.KRA_PASSWORD }}" >> .env
          echo "KRA_PASS_KEY=${{ secrets.KRA_PASS_KEY }}" >> .env
          echo "KRA_MOB_NO=${{ secrets.KRA_MOB_NO }}" >> .env
          echo "KRA_OKRA_CD_MI_ID=${{ secrets.KRA_OKRA_CD_MI_ID }}" >> .env
          echo "KRA_ENV=${{ secrets.KRA_ENV }}" >> .env

          echo "MSG91_AUTH_KEY=${{ secrets.MSG91_AUTH_KEY }}" >> .env
          echo "MSG91_SIGNUP_TEMPLATE=${{ secrets.MSG91_SIGNUP_TEMPLATE }}" >> .env
          echo "MSG91_LOGIN_TEMPLATE=${{ secrets.MSG91_LOGIN_TEMPLATE }}" >> .env
          echo "MSG91_VERIFY_TEMPLATE=${{ secrets.MSG91_VERIFY_TEMPLATE }}" >> .env

          echo "SMTP_SENDER=${{ secrets.SMTP_SENDER }}" >> .env
          echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> .env
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env
          echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> .env

          echo "CBRICS_DOMAIN=${{ secrets.CBRICS_DOMAIN }}" >> .env
          echo "CBRICS_LOGIN=${{ secrets.CBRICS_LOGIN }}" >> .env
          echo "CBRICS_PASSWORD=${{ secrets.CBRICS_PASSWORD }}" >> .env

          echo "RFQ_CBRICS_DOMAIN=${{ secrets.RFQ_CBRICS_DOMAIN }}" >> .env
          echo "RFQ_CBRICS_LOGIN=${{ secrets.RFQ_CBRICS_LOGIN }}" >> .env
          echo "RFQ_CBRICS_PASSWORD=${{ secrets.RFQ_CBRICS_PASSWORD }}" >> .env

          echo "DIGIO_USERNAME_PASS=${{ secrets.DIGIO_USERNAME_PASS }}" >> .env

          echo "NDSL_REQUESTOR_ID=${{ secrets.NDSL_REQUESTOR_ID }}" >> .env
          echo "NSDL_SECRET_KEY=${{ secrets.NSDL_SECRET_KEY }}" >> .env
          echo "NSDL_MODE=${{ secrets.NSDL_MODE }}" >> .env

          echo "CDSL_AES_KEY=${{ secrets.CDSL_AES_KEY }}" >> .env
          echo "CDSL_MODE=${{ secrets.CDSL_MODE }}" >> .env

          echo "ENTITY_ID=${{ secrets.ENTITY_ID }}" >> .env

          echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env
          echo "AUTH_GOOGLE_ID=${{ secrets.AUTH_GOOGLE_ID }}" >> .env
          echo "AUTH_GOOGLE_SECRET=${{ secrets.AUTH_GOOGLE_SECRET }}" >> .env
          echo "AUTH_FACEBOOK_ID=${{ secrets.AUTH_FACEBOOK_ID }}" >> .env
          echo "AUTH_FACEBOOK_SECRET=${{ secrets.AUTH_FACEBOOK_SECRET }}" >> .env
          echo "AUTH_MICROSOFT_ENTRA_ID_ID=${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}" >> .env
          echo "AUTH_MICROSOFT_ENTRA_ID_SECRET=${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}" >> .env
          echo "AUTH_MICROSOFT_ENTRA_ID_ISSUER=${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ISSUER }}" >> .env

          echo "RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}" >> .env
          echo "RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}" >> .env
          echo "RAZORPAY_WEBHOOK_SECRET=${{ secrets.RAZORPAY_WEBHOOK_SECRET }}" >> .env

          echo "S3_ACCESS_KEY_ID=${{ secrets.S3_ACCESS_KEY_ID }}" >> .env
          echo "S3_SECRET_ACCESS_KEY=${{ secrets.S3_SECRET_ACCESS_KEY }}" >> .env
          echo "S3_REGION=${{ secrets.S3_REGION }}" >> .env
          echo "S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}" >> .env
          echo "S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}" >> .env

      # âš ď¸Ź REMOVE THIS IN PRODUCTION
      - name: Show .env
        run: cat .env

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag & Push Docker Image
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          REPOSITORY: prod-be
          IMAGE_TAG: latest
        run: |
          docker build -f backenddocker -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: prod_tsk_be.json
          cluster: prod_cluster
          service: prod-tsk-be-svc
          force-new-deployment: true
