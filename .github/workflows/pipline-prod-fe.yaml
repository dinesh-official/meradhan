name: Production Frontend Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # FIXED .env CREATION (BULLETPROOF)
      - name: Create .env from GitHub Secrets
        run: |
          cat <<'EOF' > .env
          NEXT_PUBLIC_HOST_URL=https://www.meradhan.co
          NEXT_PUBLIC_CRM_HOST_URL=https://crm.meradhan.co
          NEXT_PUBLIC_BACKEND_HOST_URL=https://api.meradhan.co
          NEXT_PUBLIC_BACKEND_IP_URL=http://prod-meradhan-be.prod-namespace:4000
          NEXT_PUBLIC_STRAPI_HOST_URL=https://spyder.meradhan.co
          NEXT_PUBLIC_DIGIO=production
          STRAPI_API_URL=https://spyder.meradhan.co/api
          PORT=4000

          RFQ_CBRICS_ENV=PROD
          CBRICS_ENV=PROD

          GRAPHQL_KEY=${{ secrets.NEXT_PUBLIC_GRAPHQL_KEY }}
          STRAPI_API_TOKEN=${{ secrets.STRAPI_API_TOKEN }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          DIRECT_URL=${{ secrets.DIRECT_URL }}
          REDIS_HOST=${{ secrets.REDIS_HOST }}
          REDIS_PORT=${{ secrets.REDIS_PORT }}

          KRA_USERNAME=${{ secrets.KRA_USERNAME }}
          KRA_PASSWORD=${{ secrets.KRA_PASSWORD }}
          KRA_PASS_KEY=${{ secrets.KRA_PASS_KEY }}
          KRA_OKRA_CD_MI_ID=${{ secrets.KRA_OKRA_CD_MI_ID }}
          KRA_MOB_NO=${{ secrets.KRA_MOB_NO }}
          KRA_ENV=${{ secrets.KRA_ENV }}

          MSG91_AUTH_KEY=${{ secrets.MSG91_AUTH_KEY }}
          MSG91_SIGNUP_TEMPLATE=${{ secrets.MSG91_SIGNUP_TEMPLATE }}
          MSG91_LOGIN_TEMPLATE=${{ secrets.MSG91_LOGIN_TEMPLATE }}
          MSG91_VERIFY_TEMPLATE=${{ secrets.MSG91_VERIFY_TEMPLATE }}

          SMTP_SENDER=${{ secrets.SMTP_SENDER }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}

          CBRICS_DOMAIN=${{ secrets.CBRICS_DOMAIN }}
          CBRICS_LOGIN=${{ secrets.CBRICS_LOGIN }}
          CBRICS_PASSWORD=${{ secrets.CBRICS_PASSWORD }}

          RFQ_CBRICS_DOMAIN=${{ secrets.RFQ_CBRICS_DOMAIN }}
          RFQ_CBRICS_LOGIN=${{ secrets.RFQ_CBRICS_LOGIN }}
          RFQ_CBRICS_PASSWORD=${{ secrets.RFQ_CBRICS_PASSWORD }}

          DIGIO_USERNAME_PASS=${{ secrets.DIGIO_USERNAME_PASS }}
          NDSL_REQUESTOR_ID=${{ secrets.NDSL_REQUESTOR_ID }}
          NSDL_SECRET_KEY=${{ secrets.NSDL_SECRET_KEY }}

          CDSL_AES_KEY=${{ secrets.CDSL_AES_KEY }}
          ENTITY_ID=${{ secrets.ENTITY_ID }}
          CDSL_MODE=${{ secrets.CDSL_MODE }}
          NSDL_MODE=${{ secrets.NSDL_MODE }}

          AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          AUTH_GOOGLE_ID=${{ secrets.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET=${{ secrets.AUTH_GOOGLE_SECRET }}

          AUTH_FACEBOOK_ID=${{ secrets.AUTH_FACEBOOK_ID }}
          AUTH_FACEBOOK_SECRET=${{ secrets.AUTH_FACEBOOK_SECRET }}

          AUTH_MICROSOFT_ENTRA_ID_ID=${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}
          AUTH_MICROSOFT_ENTRA_ID_SECRET=${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}
          AUTH_MICROSOFT_ENTRA_ID_ISSUER=${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ISSUER }}

          RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
          RAZORPAY_WEBHOOK_SECRET=${{ secrets.RAZORPAY_WEBHOOK_SECRET }}

          S3_ACCESS_KEY_ID=${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY=${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_REGION=${{ secrets.S3_REGION }}
         
          S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}
          S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
          EOF

      # AWS CONFIG
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
           aws-access-key-id: ${{ secrets.S3_ACCESS_KEY_ID }}
           aws-secret-access-key: ${{ secrets.S3_SECRET_ACCESS_KEY }}
           aws-region: ap-south-1

      # DEBUG (optional)
      - name: Show .env
        run: cat .env

      # ECR LOGIN
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # BUILD + PUSH
      - name: Build, Tag & Push Docker Image
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          REPOSITORY: prod-fe
          IMAGE_TAG: latest
        run: |
          docker build -f Docker_fe -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      # ECS DEPLOY
      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: meradhan-fe-task.json
          cluster: prod_cluster
          service: prod-tsk-fe-svc
          force-new-deployment: true
