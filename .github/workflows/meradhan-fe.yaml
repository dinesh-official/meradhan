name: Deploy Application

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Create .env file from all secrets
        shell: bash
        run: |
          # Create .env file with all secrets
          cat <<'EOF' > .env
          # ============================================
          # STATIC CONFIGURATION
          # ============================================
          NEXT_PUBLIC_HOST_URL=https://www.meradhan.co
          NEXT_PUBLIC_CRM_HOST_URL=https://crm.meradhan.co
          NEXT_PUBLIC_BACKEND_HOST_URL=https://api.meradhan.co
          NEXT_PUBLIC_BACKEND_IP_URL=http://prod-meradhan-be.prod-namespace:4000
          NEXT_PUBLIC_STRAPI_HOST_URL=https://spyder.meradhan.co
          NEXT_PUBLIC_DIGIO=production
          STRAPI_API_URL=https://spyder.meradhan.co/api
          PORT=4000
          RFQ_CBRICS_ENV=PROD
          CBRICS_ENV=PROD
          EOF
          
          # ============================================
          # APP SECRETS
          # ============================================
          printf "NEXT_PUBLIC_GRAPHQL_KEY=%s\n" "${{ secrets.NEXT_PUBLIC_GRAPHQL_KEY }}" >> .env
          printf "GRAPHQL_KEY=%s\n" "${{ secrets.NEXT_PUBLIC_GRAPHQL_KEY }}" >> .env
          printf "STRAPI_API_TOKEN=%s\n" "${{ secrets.STRAPI_API_TOKEN }}" >> .env
          printf "JWT_SECRET=%s\n" "${{ secrets.JWT_SECRET }}" >> .env
          printf "DATABASE_URL=%s\n" "${{ secrets.DATABASE_URL }}" >> .env
          printf "DIRECT_URL=%s\n" "${{ secrets.DIRECT_URL }}" >> .env
          printf "REDIS_HOST=%s\n" "${{ secrets.REDIS_HOST }}" >> .env
          printf "REDIS_PORT=%s\n" "${{ secrets.REDIS_PORT }}" >> .env
          
          # ============================================
          # KRA SECRETS
          # ============================================
          printf "KRA_USERNAME=%s\n" "${{ secrets.KRA_USERNAME }}" >> .env
          printf "KRA_PASSWORD=%s\n" "${{ secrets.KRA_PASSWORD }}" >> .env
          printf "KRA_PASS_KEY=%s\n" "${{ secrets.KRA_PASS_KEY }}" >> .env
          printf "KRA_OKRA_CD_MI_ID=%s\n" "${{ secrets.KRA_OKRA_CD_MI_ID }}" >> .env
          printf "KRA_MOB_NO=%s\n" "${{ secrets.KRA_MOB_NO }}" >> .env
          printf "KRA_ENV=%s\n" "${{ secrets.KRA_ENV }}" >> .env
          
          # ============================================
          # MSG91 SECRETS
          # ============================================
          printf "MSG91_AUTH_KEY=%s\n" "${{ secrets.MSG91_AUTH_KEY }}" >> .env
          printf "MSG91_SIGNUP_TEMPLATE=%s\n" "${{ secrets.MSG91_SIGNUP_TEMPLATE }}" >> .env
          printf "MSG91_LOGIN_TEMPLATE=%s\n" "${{ secrets.MSG91_LOGIN_TEMPLATE }}" >> .env
          printf "MSG91_VERIFY_TEMPLATE=%s\n" "${{ secrets.MSG91_VERIFY_TEMPLATE }}" >> .env
          
          # ============================================
          # SMTP SECRETS
          # ============================================
          printf "SMTP_SENDER=%s\n" "${{ secrets.SMTP_SENDER }}" >> .env
          printf "SMTP_HOST=%s\n" "${{ secrets.SMTP_HOST }}" >> .env
          printf "SMTP_PORT=%s\n" "${{ secrets.SMTP_PORT }}" >> .env
          printf "SMTP_USER=%s\n" "${{ secrets.SMTP_USER }}" >> .env
          printf "SMTP_PASS=%s\n" "${{ secrets.SMTP_PASS }}" >> .env
          
          # ============================================
          # CBRICS SECRETS
          # ============================================
          printf "CBRICS_DOMAIN=%s\n" "${{ secrets.CBRICS_DOMAIN }}" >> .env
          printf "CBRICS_LOGIN=%s\n" "${{ secrets.CBRICS_LOGIN }}" >> .env
          printf "CBRICS_PASSWORD=%s\n" "${{ secrets.CBRICS_PASSWORD }}" >> .env
          printf "RFQ_CBRICS_DOMAIN=%s\n" "${{ secrets.RFQ_CBRICS_DOMAIN }}" >> .env
          printf "RFQ_CBRICS_LOGIN=%s\n" "${{ secrets.RFQ_CBRICS_LOGIN }}" >> .env
          printf "RFQ_CBRICS_PASSWORD=%s\n" "${{ secrets.RFQ_CBRICS_PASSWORD }}" >> .env
          
          # ============================================
          # DIGIO SECRETS
          # ============================================
          printf "DIGIO_USERNAME_PASS=%s\n" "${{ secrets.DIGIO_USERNAME_PASS }}" >> .env
          
          # ============================================
          # NSDL/CDSL SECRETS
          # ============================================
          printf "NDSL_REQUESTOR_ID=%s\n" "${{ secrets.NDSL_REQUESTOR_ID }}" >> .env
          printf "NSDL_SECRET_KEY=%s\n" "${{ secrets.NSDL_SECRET_KEY }}" >> .env
          printf "CDSL_AES_KEY=%s\n" "${{ secrets.CDSL_AES_KEY }}" >> .env
          printf "ENTITY_ID=%s\n" "${{ secrets.ENTITY_ID }}" >> .env
          printf "CDSL_MODE=%s\n" "${{ secrets.CDSL_MODE }}" >> .env
          printf "NSDL_MODE=%s\n" "${{ secrets.NSDL_MODE }}" >> .env
          
          # ============================================
          # AUTHENTICATION SECRETS
          # ============================================
          printf "AUTH_SECRET=%s\n" "${{ secrets.AUTH_SECRET }}" >> .env
          printf "AUTH_GOOGLE_ID=%s\n" "${{ secrets.AUTH_GOOGLE_ID }}" >> .env
          printf "AUTH_GOOGLE_SECRET=%s\n" "${{ secrets.AUTH_GOOGLE_SECRET }}" >> .env
          printf "AUTH_FACEBOOK_ID=%s\n" "${{ secrets.AUTH_FACEBOOK_ID }}" >> .env
          printf "AUTH_FACEBOOK_SECRET=%s\n" "${{ secrets.AUTH_FACEBOOK_SECRET }}" >> .env
          printf "AUTH_MICROSOFT_ENTRA_ID_ID=%s\n" "${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}" >> .env
          printf "AUTH_MICROSOFT_ENTRA_ID_SECRET=%s\n" "${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}" >> .env
          printf "AUTH_MICROSOFT_ENTRA_ID_ISSUER=%s\n" "${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ISSUER }}" >> .env
          
          # ============================================
          # RAZORPAY SECRETS
          # ============================================
          printf "RAZORPAY_KEY_ID=%s\n" "${{ secrets.RAZORPAY_KEY_ID }}" >> .env
          printf "RAZORPAY_KEY_SECRET=%s\n" "${{ secrets.RAZORPAY_KEY_SECRET }}" >> .env
          printf "RAZORPAY_WEBHOOK_SECRET=%s\n" "${{ secrets.RAZORPAY_WEBHOOK_SECRET }}" >> .env
          
          # ============================================
          # S3 STORAGE SECRETS
          # ============================================
          printf "S3_ACCESS_KEY_ID=%s\n" "${{ secrets.S3_ACCESS_KEY_ID }}" >> .env
          printf "S3_SECRET_ACCESS_KEY=%s\n" "${{ secrets.S3_SECRET_ACCESS_KEY }}" >> .env
          printf "S3_REGION=%s\n" "${{ secrets.S3_REGION }}" >> .env
          printf "S3_ENDPOINT=%s\n" "${{ secrets.S3_ENDPOINT }}" >> .env
          printf "S3_BUCKET_NAME=%s\n" "${{ secrets.S3_BUCKET_NAME }}" >> .env
          
          # ============================================
          # AWS DEPLOYMENT SECRETS
          # ============================================
          printf "AWS_ACCESS_KEY_ID=%s\n" "${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
          printf "AWS_SECRET_ACCESS_KEY=%s\n" "${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
          printf "AWS_REGION=%s\n" "${{ secrets.AWS_REGION }}" >> .env
          printf "ECR_REGISTRY=%s\n" "${{ secrets.ECR_REGISTRY }}" >> .env
          
          echo "✅ .env file created successfully"
          echo "📁 Total lines: $(wc -l < .env)"
      
      - name: Show .env preview (hide sensitive values)
        shell: bash
        run: |
          echo "📋 .env file preview (values hidden):"
          cat .env | sed 's/=.*/=***/' | head -20
          echo "..."
      
      - name: Use .env file in your application
        shell: bash
        run: |
          # Example: Load .env and run your application
          source .env
          echo "✅ Environment loaded successfully"
          echo "🚀 Application can now use these variables"
          
          # Your actual deployment commands here
          # npm install
          # npm run build
          # docker build -t your-app .
          # etc.
      
      # Optional: Upload .env as artifact for debugging
      - name: Upload .env artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: env-file
          path: .env
          retention-days: 1
